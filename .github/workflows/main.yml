# This is a basic workflow to help you get started with Actions
name: Production Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches-ignore: [dependabot/*]
    paths-ignore:
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  NODE_VERSION: ${{ vars.NODE_VERSION || '26.x'}}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 👷 Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🏗️ Setup Node.js ${{ env.NODE_VERSION }} environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: true

      - name: ⚡ Cache node_modules
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: 🏗️ Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install
        env:
          FONT_AWESOME_TOKEN: ${{secrets.FONT_AWESOME_TOKEN}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN}}

      - name: 🏗️ Build Site with Vite
        run: npm run build
        env:
          FONT_AWESOME_TOKEN: ${{secrets.FONT_AWESOME_TOKEN}}
          SNYK_TOKEN: ${{secrets.SNYK_TOKEN}}

      - name: 📦 Create and upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: whatdat-artifact
          path: "dist/"
          retention-days: 1

  call-deploy-workflow:
    needs: [build]
    uses: mikesprague/reusable-workflows/.github/workflows/pages-deploy.yml@main
    secrets:
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN}}
    with:
      artifact-name: whatdat-artifact
